utton>\n    <button onclick=\"{{ navTap4 }}\" style=\"display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0 12px;min-height:58px;background:none;border:none;cursor:pointer\">\n      <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"{{ navColor4 }}\" stroke-width=\"2\" stroke-linecap=\"square\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"3\"><\/circle><path d=\"M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v.08a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z\"><\/path><\/svg>\n      <span style=\"font:600 11px/13px 'Public Sans',sans-serif;color:{{ navColor4 }}\">Ayarlar<\/span>\n    <\/button>\n  <\/div>\n  <\/sc-if>\n<\/div>\n<\/x-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;: {&quot;width&quot;: 430, &quot;height&quot;: 900}}\">\nconst KURS_EZBER_ICERIK = {\n  \"1\": {\n    \"seri\": \"Elmas Serisi 1\",\n    \"vecize\": \"Bir köy muhtarsız olamaz. Bir iğne ustasız olamaz, sahipsiz olamaz. Bir harf kâtipsiz olamaz, biliyorsun. Nasıl oluyor ki, nihayet derecede muntazam şu memleket hâkimsiz olur?\",\n    \"sureAdi\": \"Sübhâneke Duası\",\n    \"sure\": [\n      \"سُبْحَانَكَ اللّٰهُمَّ وَبِحَمْدِكَ ۞ وَتَبَارَكَ اسْمُكَ\",\n      \"وَتَعَالَى جَدُّكَ ۞ وَلَا إِلٰهَ غَيْرُكَ\"\n    ],\n    \"ilmihalBaslik\": \"Ef'âl-i Mükellefîn Nedir?\",\n    \"ilmihal\": [\n      \"Ef'âl-i Mükellefîn, İslam'da akıl baliğ olan bir Müslümanın yapmakla sorumlu olduğu fiil ve davranışların dini hükümlere göre sınıflandırılmasıdır.\",\n      \"Mükellef: Sorumlu olan kişi.\",\n      \"Ef'âl: Fiil kelimesinin çoğulu olup, fiiller demektir.\",\n      \"Neden böyle bir sınıflandırma var?\",\n      \"Çünkü İslam'da her davranış aynı değildir.\",\n      \"Bazısı kesin emirdir: Farz\",\n      \"Bazısı tavsiye edilir: Sünnet, Müstehap\",\n      \"Bazısı serbesttir: Mübah\",\n      \"Bazısı yasaktır: Haram\"\n    ],\n    \"kelimeler\": [\n      [\n        \"Tevhid\",\n        \"Birlik, birleme; Allah'ın birliği\"\n      ],\n      [\n        \"Hüccet\",\n        \"Delil, ispatlayıcı söz\"\n      ],\n      [\n        \"Fakihe\",\n        \"Meyve, yemiş\"\n      ],\n      [\n        \"Mizan\",\n        \"Terazi, ölçü, tartı\"\n      ],\n      [\n        \"Hâkim\",\n        \"Galib, başkasını müdahale ettirmeden idare eden; Allah (CC)\"\n      ],\n      [\n        \"İntizam\",\n        \"Düzen, tertip\"\n      ]\n    ]\n  },\n  \"2\": {\n    \"seri\": \"Elmas Serisi 2\",\n    \"vecize\": \"Namaz kılanın diğer mubah dünyevî amelleri, güzel bir niyet ile ibadet hükmünü alır.\",\n    \"sureAdi\": \"Tahiyyat Duası\",\n    \"sure\": [\n      \"التَّحِيَّاتُ لِلّٰهِ وَالصَّلَوَاتُ وَالطَّيِّبَاتُ ۞ السَّلَامُ عَلَيْكَ أَيُّهَا النَّبِيُّ\",\n      \"وَرَحْمَةُ اللّٰهِ وَبَرَكَاتُهُ ۞ السَّلَامُ عَلَيْنَا وَعَلَى عِبَادِ اللّٰهِ الصَّالِحِينَ\",\n      \"أَشْهَدُ أَنْ لَا إِلٰهَ إِلَّا اللّٰهُ ۞ وَأَشْهَدُ أَنَّ مُحَمَّدًا عَبْدُهُ وَرَسُولُهُ\"\n    ],\n    \"ilmihalBaslik\": \"Ef'âl-i Mükellefîn Kaç Tanedir?\",\n    \"ilmihal\": [\n      \"Farz: Kesin olarak yapılması emredilen. Yapana sevap, terk edene ceza vardır. Örnek: Namaz kılmak\",\n      \"Vacip: Farza çok yakın, kuvvetli delille sabit olan. Örnek: Vitir namazı\",\n      \"Sünnet: Peygamber Efendimizin yaptığı ve tavsiye ettiği. Örnek: Sabah namazının sünneti\",\n      \"Müstehap (Mendup): Yapılması güzel görülen, sevap kazandıran. Örnek: Sadaka vermek\",\n      \"Mübah: Yapılması da yapılmaması da serbest olan. Örnek: Yemek yemek (helal dairede)\",\n      \"Mekruh: Yapılması hoş görülmeyen. Örnek: Soğan yiyip camiye gitmek\",\n      \"Haram: Kesin olarak yasaklanan. Örnek: İçki içmek\",\n      \"Müfsid: Yapılan ibadeti bozan şeyler. Örnek: Namazı bozan davranışlar\"\n    ],\n    \"kelimeler\": [\n      [\n        \"Mütedeyyin\",\n        \"Dindar\"\n      ],\n      [\n        \"Muvakkat\",\n        \"Geçici\"\n      ],\n      [\n        \"Dünyevi\",\n        \"Dünyaya ait\"\n      ],\n      [\n        \"Mübah\",\n        \"İşlenmesinde sevap ve günah olmayan şeyler\"\n      ],\n      [\n        \"Sermaye-i Ömür\",\n        \"İnsana verilen ömür\"\n      ],\n      [\n        \"Hilaf-ı Akıl\",\n        \"Akla aykırı, akla ters\"\n      ]\n    ]\n  },\n  \"3\": {\n    \"seri\": \"Elmas Serisi 3\",\n    \"vecize\": \"Anlaşılmaz bir kitap, muallimsiz olsa; manasız bir kâğıttan ibaret kalır.\",\n    \"sureAdi\": \"Salli-Bârik Duaları\",\n    \"sure\": [\n      \"اللّٰهُمَّ صَلِّ عَلَى مُحَمَّدٍ وَعَلَى آلِ مُحَمَّدٍ ۞ كَمَا صَلَّيْتَ عَلَى إِبْرَاهِيمَ وَعَلَى آلِ إِبْرَاهِيمَ ۞ إِنَّكَ حَمِيدٌ مَجِيدٌ\",\n      \"اللّٰهُمَّ بَارِكْ عَلَى مُحَمَّدٍ وَعَلَى آلِ مُحَمَّدٍ ۞ كَمَا بَارَكْتَ عَلَى إِبْرَاهِيمَ وَعَلَى آلِ إِبْرَاهِيمَ ۞ إِنَّكَ حَمِيدٌ مَجِيدٌ\"\n    ],\n    \"ilmihalBaslik\": \"32 Farz Nedir?\",\n    \"ilmihal\": [\n      \"32 Farz, İslam'da her Müslümanın bilmesi gereken temel dinî vazifelerin topluca anlatıldığı bir ilmihal özetidir. Altı ana başlıkta incelenir.\",\n      \"İmanın Şartları:\",\n      \"Allah'a iman\",\n      \"Meleklere iman\",\n      \"Kitaplara iman\",\n      \"Peygamberlere iman\",\n      \"Ahiret gününe iman\",\n      \"Kadere iman\",\n      \"İslam'ın Şartları:\",\n      \"Kelime-i şehadet getirmek\",\n      \"Namaz kılmak\",\n      \"Oruç tutmak\",\n      \"Zekât vermek\",\n      \"Hacca gitmek\"\n    ],\n    \"kelimeler\": [\n      [\n        \"Himmet\",\n        \"Gayret, çaba, yardım\"\n      ],\n      [\n        \"Haysiyet\",\n        \"İtibar, şeref, değer\"\n      ],\n      [\n        \"Techiz\",\n        \"Donatmak, cihazlamak\"\n      ],\n      [\n        \"Mutaassıb\",\n        \"Aşırı derecede kendi tarafını tutan\"\n      ],\n      [\n        \"Ahlâk-ı Hasene\",\n        \"Güzel ahlak\"\n      ],\n      [\n        \"Muallim\",\n        \"Ta'lim eden, öğretmen\"\n      ]\n    ]\n  },\n  \"4\": {\n    \"seri\": \"Elmas Serisi 4\",\n    \"vecize\": \"Bu zamanda en büyük bir ihsan, bir vazife, imanı kurtarmaktır; başkalarının imanına kuvvet verecek bir surette çalışmaktır.\",\n    \"sureAdi\": \"Rabbena Duaları\",\n    \"sure\": [\n      \"رَبَّنَا آتِنَا فِي الدُّنْيَا حَسَنَةً وَفِي الْآخِرَةِ حَسَنَةً وَقِنَا عَذَابَ النَّارِ\",\n      \"رَبَّنَا اغْفِرْ لِي وَلِوَالِدَيَّ وَلِلْمُؤْمِنِينَ يَوْمَ يَقُومُ الْحِسَابُ\"\n    ],\n    \"ilmihalBaslik\": \"32 Farz Nedir? (Devam)\",\n    \"ilmihal\": [\n      \"Abdestin Farzları:\",\n      \"Yüzü bir defa yıkamak\",\n      \"Elleri dirsekler dahil olmak üzere bir defa yıkamak\",\n      \"Başın dörtte birini ıslak el ile meshetmek\",\n      \"Ayakları topuklarla beraber bir defa yıkamak\",\n      \"Guslün Farzları:\",\n      \"Ağza bolca su alarak ağzın içini iyice çalkalamak, dişlerin arasını temizlemek\",\n      \"Burna su çekip genize kadar ulaştırarak yıkamak\",\n      \"Saç diplerinden ayak başparmağına kadar bedenin her yerini yıkamak, vücutta kuru yer bırakmamak\",\n      \"Teyemmümün Farzları:\",\n      \"Niyet etmek\",\n      \"Temiz toprağa eller vurularak yüzün tamamını; daha sonra tekrar vurularak kolları dirsekler dahil meshetmek\"\n    ],\n    \"kelimeler\": [\n      [\n        \"Sahra\",\n        \"Çöl\"\n      ],\n      [\n        \"Himaye\",\n        \"Koruma\"\n      ],\n      [\n        \"Tertip\",\n        \"Düzen\"\n      ],\n      [\n        \"İtham\",\n        \"Suçlama\"\n      ],\n      [\n        \"Tebliğ\",\n        \"İman hakikatlerini bilmeyenlere ulaştırmak, bildirmek\"\n      ],\n      [\n        \"Hâkim\",\n        \"Galib\"\n      ]\n    ]\n  },\n  \"5\": {\n    \"seri\": \"Elmas Serisi 5\",\n    \"vecize\": \"Şimdi bak Allah'ın rahmet eserlerine: Yeryüzünü ölümünün ardından nasıl diriltiyor? Bunu yapan, elbette ölüleri de öylece diriltecektir; O her şeye hakkıyla kâdirdir. (Rum Sûresi, 30:50)\",\n    \"sureAdi\": \"Kunut - 1\",\n    \"sure\": [\n      \"اللّٰهُمَّ إِنَّا نَسْتَعِينُكَ وَنَسْتَغْفِرُكَ وَنَسْتَهْدِيكَ ۞ وَنُؤْمِنُ بِكَ وَنَتُوبُ إِلَيْكَ\",\n      \"وَنَتَوَكَّلُ عَلَيْكَ وَنُثْنِي عَلَيْكَ الْخَيْرَ كُلَّهُ نَشْكُرُكَ وَلَا نَكْفُرُكَ\",\n      \"وَنَخْلَعُ وَنَتْرُكُ مَنْ يَفْجُرُكَ\"\n    ],\n    \"ilmihalBaslik\": \"32 Farz Nedir? (Devam)\",\n    \"ilmihal\": [\n      \"Namazın Dışındaki Farzları:\",\n      \"Hadesten Tahâret: Abdesti olmayanın abdest alması, gerekirse gusletmesi\",\n      \"Necâsetten Tahâret: Bedeni, elbiseyi ve namaz kılınacak yeri pisliklerden temizlemek\",\n      \"Setr-i Avret: Örtünmesi gereken yerleri örtmek\",\n      \"İstikbâl-i Kıble: Namazı Kâbe'ye (Kıble'ye) doğru kılmak\",\n      \"Vakit: Namazı kendi vakti içinde kılmak\",\n      \"Niyet: Hangi namazı kılacağına niyet etmek\",\n      \"Namazın İçindeki Farzları:\",\n      \"İftitah tekbiri: Namaza başlarken Allahü ekber demektir.\",\n      \"Kıyam: Namazda ayakta durmaktır. Ayakta duramayan hasta, oturur. Oturarak kılamayan yatarak ima ile kılar.\",\n      \"Kıraat: Namazda, Kur'an-ı Kerîm'den sure / âyet okumaktır.\",\n      \"Rükû: Ayakta okuma bittikten sonra, eğilip elleri dize koymaktır.\",\n      \"Secde: Rükûdan sonra yere kapanmaktır.\",\n      \"Kâde-i âhire: Son rekatta Ettehiyyatü'yü okuyacak kadar oturmaktır.\"\n    ],\n    \"kelimeler\": [\n      [\n        \"Bidayet\",\n        \"Başlangıç\"\n      ],\n      [\n        \"Temsil\",\n        \"Örnek\"\n      ],\n      [\n        \"Teşkil\",\n        \"Şekil vermek\"\n      ],\n      [\n        \"İstib'ad\",\n        \"Akıldan uzak görme\"\n      ],\n      [\n        \"Mizan\",\n        \"Ölçü\"\n      ],\n      [\n        \"Letaif\",\n        \"Duygular\"\n      ]\n    ]\n  },\n  \"6\": {\n    \"seri\": \"Elmas Serisi 6\",\n    \"vecize\": \"Namazın manası, Cenab-ı Hakk'ı tesbih ve ta'zim ve şükürdür.\",\n    \"sureAdi\": \"Kunut - 2\",\n    \"sure\": [\n      \"اللّٰهُمَّ إِيَّاكَ نَعْبُدُ وَلَكَ نُصَلِّي وَنَسْجُدُ ۞ وَإِلَيْكَ نَسْعَى وَنَحْفِدُ\",\n      \"نَرْجُو رَحْمَتَكَ وَنَخْشَى عَذَابَكَ ۞ إِنَّ عَذَابَكَ بِالْكُفَّارِ مُلْحِقٌ\"\n    ],\n    \"ilmihalBaslik\": \"Abdest Nasıl Alınır?\",\n    \"ilmihal\": [\n      \"Allah rızası için abdest almaya niyet ettim diyerek niyet edilir.\",\n      \"Eûzü-Besmele çekilir.\",\n      \"Eller bileklere kadar üç defa yıkanır.\",\n      \"Ağza sağ elle üç defa su verilir.\",\n      \"Burna üç defa sağ elle su çekilir; sol elle burun temizlenir.\",\n      \"Alından çeneye, kulaktan kulağa kadar yüz üç defa yıkanır.\",\n      \"Sağ ve sol kol dirseklerle birlikte üç defa yıkanır.\",\n      \"Sağ el ıslatılarak başa bir defa sürülür; yani mesh edilir.\",\n      \"Kulakların iç kısmı işaret parmağıyla, dış kısmı başparmakla mesh edilir.\",\n      \"Boyun mesh edilir.\",\n      \"Sağ ve sol ayak topuklarla birlikte üç defa yıkanır.\"\n    ],\n    \"kelimeler\": [\n      [\n        \"İbad\",\n        \"Kullar\"\n      ],\n      [\n        \"Tekzip\",\n        \"Yalanlamak\"\n      ],\n      [\n        \"İnkâr\",\n        \"Yok saymak\"\n      ],\n      [\n        \"Hilkat\",\n        \"Yaratılış\"\n      ],\n      [\n        \"Kebir\",\n        \"Büyük\"\n      ],\n      [\n        \"Müteveccih\",\n        \"Yönelmek\"\n      ]\n    ]\n  },\n  \"7\": {\n    \"seri\": \"Elmas Serisi 7\",\n    \"vecize\": \"Dünya, âhiret hayatının tarlasıdır. Bu fırsatı iyi değerlendirmek gerekir.\",\n    \"sureAdi\": \"Fatiha Suresi\",\n    \"sure\": [\n      \"بِسْمِ اللّٰهِ الرَّحْمٰنِ الرَّحِيمِ\",\n      \"اَلْحَمْدُ لِلّٰهِ رَبِّ الْعَالَمِينَ\",\n      \"اَلرَّحْمٰنِ الرَّحِيمِ\",\n      \"مَالِكِ يَوْمِ الدِّينِ\",\n      \"إِيَّاكَ نَعْبُدُ وَإِيَّاكَ نَسْتَعِينُ\",\n      \"اِهْدِنَا الصِّرَاطَ الْمُسْتَقِيمَ\",\n      \"صِرَاطَ الَّذِينَ أَنْعَمْتَ عَلَيْهِمْ غَيْرِ الْمَغْضُوبِ عَلَيْهِمْ وَلَا الضَّالِّينَ\"\n    ],\n    \"ilmihalBaslik\": \"Namazın Farzları Nelerdir?\",\n    \"ilmihal\": [\n      \"Namaz içi farzlar (rükünler): 1- İftitah tekbiri, 2- Kıyam, 3- Kıraat, 4- Rükû, 5- Secde, 6- Ka'de-i ahîre.\",\n      \"Namaz dışı farzlar (şartlar): 1- Hadesten taharet, 2- Necasetten taharet, 3- Setr-i avret, 4- İstikbal-i kıble, 5- Vakit, 6- Niyet.\"\n    ],\n    \"kelimeler\": [\n      [\n        \"Marifet\",\n        \"Allah'ı tanıma\"\n      ],\n      [\n        \"Hikmet\",\n        \"Gaye, sebep\"\n      ],\n      [\n        \"Fıtrat\",\n        \"Yaratılış, tabiat\"\n      ],\n      [\n        \"Tâlim\",\n        \"Öğretmek\"\n      ],\n      [\n        \"Tefekkür\",\n        \"Düşünmek\"\n      ],\n      [\n        \"Müstakîm\",\n        \"Doğru, düzgün\"\n      ]\n    ]\n  },\n  \"8\": {\n    \"seri\": \"Elmas Serisi 8\",\n    \"vecize\": \"Cenâb-ı Hak, insanı bütün esmâsına câmi bir ayna olarak yaratmıştır.\",\n    \"sureAdi\": \"Nas Suresi\",\n    \"sure\": [\n      \"بِسْمِ اللّٰهِ الرَّحْمٰنِ الرَّحِيمِ ۞ قُلْ أَعُوذُ بِرَبِّ النَّاسِ\",\n      \"مَلِكِ النَّاسِ\",\n      \"إِلٰهِ النَّاسِ\",\n      \"مِنْ شَرِّ الْوَسْوَاسِ الْخَنَّاسِ\",\n      \"الَّذِي يُوَسْوِسُ فِي صُدُورِ النَّاسِ\",\n      \"مِنَ الْجِنَّةِ وَالنَّاسِ\"\n    ],\n    \"ilmihalBaslik\": \"İki Rekatlık Namaz Nasıl Kılınır? (Birinci Rekat)\",\n    \"ilmihal\": [\n      \"Niyet edilir.\",\n      \"Allahu Ekber diyerek İftitah Tekbiri alınır.\",\n      \"Sübhâneke okunur.\",\n      \"Eûzü-Besmele çekilir.\",\n      \"Fatiha suresi okunur.\",\n      \"Kısa bir sure veya ayet okunur.\",\n      \"Allahu Ekber diyerek rükûya gidilir. Rükûda üç defa Sübhâne Rabbiyel Azîm denir.\",\n      \"Semiallâhü limen hamideh diyerek doğrulunur. Rabbenâ lekel hamd denir.\",\n      \"Allahu Ekber diyerek secdeye gidilir. Üç defa Sübhâne Rabbiyel A'lâ denir.\",\n      \"Allahu Ekber diyerek secdeden doğrulunur.\",\n      \"Tekrar secde yapılır. Üç defa Sübhâne Rabbiyel A'lâ denir.\",\n      \"Allahu Ekber diyerek ayağa kalkılır, ikinci rekata geçilir.\"\n    ],\n    \"kelimeler\": [\n      [\n        \"Esmâ\",\n        \"İsimler\"\n      ],\n      [\n        \"Rahmet\",\n        \"Merhamet\"\n      ],\n      [\n        \"Kudret\",\n        \"Güç\"\n      ],\n      [\n        \"Müddehar\",\n        \"Biriktirilen\"\n      ],\n      [\n        \"Câmi\",\n        \"Toplayan\"\n      ],\n      [\n        \"Mîzan\",\n        \"Ölçü, terazi\"\n      ]\n    ]\n  },\n  \"9\": {\n    \"seri\": \"Elmas Serisi 9\",\n    \"vecize\": \"Kur'ân-ı Hakîm, şu kitab-ı kebîr-i kâinatın bir tercüme-i ezeliyesidir.\",\n    \"sureAdi\": \"Felak Suresi\",\n    \"sure\": [\n      \"بِسْمِ اللّٰهِ الرَّحْمٰنِ الرَّحِيمِ ۞ قُلْ أَعُوذُ بِرَبِّ الْفَلَقِ\",\n      \"مِنْ شَرِّ مَا خَلَقَ\",\n      \"وَمِنْ شَرِّ غَاسِقٍ إِذَا وَقَبَ\",\n      \"وَمِنْ شَرِّ النَّفَّاثَاتِ فِي الْعُقَدِ\",\n      \"وَمِنْ شَرِّ حَاسِدٍ إِذَا حَسَدَ\"\n    ],\n    \"ilmihalBaslik\": \"Gusül (Boy Abdesti) Nasıl Alınır?\",\n    \"ilmihal\": [\n      \"Niyet edilir.\",\n      \"Eller yıkanır.\",\n      \"Avret yerleri yıkanır.\",\n      \"Namaz abdesti gibi abdest alınır.\",\n      \"Önce başa üç defa su dökülür.\",\n      \"Sağ omuza üç defa su dökülür.\",\n      \"Sol omuza üç defa su dökülür.\",\n      \"Tüm vücutta kuru yer kalmaması sağlanır.\"\n    ],\n    \"kelimeler\": [\n      [\n        \"Hakîm\",\n        \"Hikmetli\"\n      ],\n      [\n        \"Tercüme\",\n        \"Çeviri\"\n      ],\n      [\n        \"Ezelî\",\n        \"Başlangıcı olmayan\"\n      ],\n      [\n        \"Kâinat\",\n        \"Evren\"\n      ],\n      [\n        \"Kitab-ı Kebîr\",\n        \"Büyük kitap\"\n      ],\n      [\n        \"Furkan\",\n        \"Hak ile batılı ayıran\"\n      ]\n    ]\n  },\n  \"10\": {\n    \"seri\": \"Elmas Serisi 10\",\n    \"vecize\": \"İnsan, üç cihetle esmâ-i İlâhiyeye bir aynadır.\",\n    \"sureAdi\": \"İhlas Suresi\",\n    \"sure\": [\n      \"بِسْمِ اللّٰهِ الرَّحْمٰنِ الرَّحِيمِ ۞ قُلْ هُوَ اللّٰهُ أَحَدٌ\",\n      \"اَللّٰهُ الصَّمَدُ\",\n      \"لَمْ يَلِدْ وَلَمْ يُولَدْ\",\n      \"وَلَمْ يَكُنْ لَهُ كُفُوًا أَحَدٌ\"\n    ],\n    \"ilmihalBaslik\": \"Teyemmüm Nasıl Alınır?\",\n    \"ilmihal\": [\n      \"Teyemmüme niyet edilir.\",\n      \"Eller temiz toprak veya toprak cinsinden bir şeye sürülür.\",\n      \"Eller yüze bir defa mesh edilir.\",\n      \"Eller tekrar toprağa sürülür.\",\n      \"Sol el ile sağ kol dirseğe kadar mesh edilir.\",\n      \"Sağ el ile sol kol dirseğe kadar mesh edilir.\"\n    ],\n    \"kelimeler\": [\n      [\n        \"Esmâ-i İlâhiye\",\n        \"Allah'ın isimleri\"\n      ],\n      [\n        \"Nakış\",\n        \"İşleme, süsleme\"\n      ],\n      [\n        \"Cihet\",\n        \"Yön, taraf\"\n      ],\n      [\n        \"Ayna\",\n        \"Yansıtan\"\n      ],\n      [\n        \"Samed\",\n        \"Her şey O'na muhtaç\"\n      ],\n      [\n        \"Ehad\",\n        \"Bir, tek\"\n      ]\n    ]\n  },\n  \"11\": {\n    \"seri\": \"Elmas Serisi 11\",\n    \"vecize\": \"Kıyamet gününde insanoğlu; ömrünü nerede tükettiğinden, gençliğini nerede yıprattığından, malını nerede kazanıp nereye harcadığından ve bildiğiyle nasıl amel ettiğinden sorguya çekilmedikçe bulunduğu yerden ayrılamaz.\",\n    \"sureAdi\": \"Tebbet Suresi\",\n    \"sure\": [\n      \"بِسْمِ اللّٰهِ الرَّحْمٰنِ الرَّحِيمِ ۞ تَبَّتْ يَدَا أَبِي لَهَبٍ وَتَبَّ\",\n      \"مَا أَغْنَى عَنْهُ مَالُهُ وَمَا كَسَبَ\",\n      \"سَيَصْلَى نَارًا ذَاتَ لَهَبٍ\",\n      \"وَامْرَأَتُهُ حَمَّالَةَ الْحَطَبِ\",\n      \"فِي جِيدِهَا حَبْلٌ مِنْ مَسَدٍ\"\n    ],\n    \"ilmihalBaslik\": \"İki Rekatlık Namaz Nasıl Kılınır? (İkinci Rekat)\",\n    \"ilmihal\": [\n      \"Besmele çekilir.\",\n      \"Fatiha suresi ve kısa bir sure veya ayet okunur.\",\n      \"Rükûya gidilir. Üç defa Sübhâne Rabbiyel Azîm denir.\",\n      \"Doğrulunur. Rabbenâ lekel hamd denir.\",\n      \"Secdeye gidilir. Üç defa Sübhâne Rabbiyel A'lâ denir.\",\n      \"Secdeden doğrulunur.\",\n      \"Tekrar secde yapılır. Üç defa Sübhâne Rabbiyel A'lâ denir.\",\n      \"Oturulur. Ettehiyyâtü, Salli-Bârik, Rabbenâ duaları okunur.\",\n      \"Sağ ve sol tarafa selam verilir.\",\n      \"Namaz tamamlanmış olur.\"\n    ],\n    \"kelimeler\": [\n      [\n        \"Hatîat\",\n        \"Hatalar\"\n      ],\n      [\n        \"Yekûn\",\n        \"Toptan\"\n      ],\n      [\n        \"Müteaddid\",\n        \"Birçok\"\n      ],\n      [\n        \"Tevellüd\",\n        \"Ortaya çıkmak\"\n      ],\n      [\n        \"Kebair\",\n        \"Büyük günahlar\"\n      ],\n      [\n        \"Sefahet\",\n        \"Haram eğlenceler\"\n      ]\n    ]\n  },\n  \"12\": {\n    \"seri\": \"Elmas Serisi 12\",\n    \"vecize\": \"Sizden biriniz, kendisi için istediğini kardeşi için de istemedikçe gerçek mânâda iman etmiş olmaz.\",\n    \"sureAdi\": \"Nasr Suresi\",\n    \"sure\": [\n      \"بِسْمِ اللّٰهِ الرَّحْمٰنِ الرَّحِيمِ ۞ إِذَا جَاءَ نَصْرُ اللّٰهِ وَالْفَتْحُ\",\n      \"وَرَأَيْتَ النَّاسَ يَدْخُلُونَ فِي دِينِ اللّٰهِ أَفْوَاجًا\",\n      \"فَسَبِّحْ بِحَمْدِ رَبِّكَ وَاسْتَغْفِرْهُ إِنَّهُ كَانَ تَوَّابًا\"\n    ],\n    \"ilmihalBaslik\": \"Dört Rekatlık Sünnet ve Farzın Kılınışı\",\n    \"ilmihal\": [\n      \"DÖRT REKATLIK SÜNNETİN KILINIŞI:\",\n      \"Birinci Rekât: İftitah Tekbiri, Sübhaneke, Eûzü-Besmele, Fatiha, Ek sure, Rükû, Secde\",\n      \"İkinci Rekât: Besmele, Fatiha, Ek sure, Rükû, Secde, İlk Oturuş: Tahiyyat\",\n      \"Üçüncü Rekât: Besmele, Fatiha, Ek sure, Rükû, Secde\",\n      \"Dördüncü Rekât: Besmele, Fatiha, Ek sure, Rükû, Secde, Son Oturuş: Tahiyyat, Salli-Bârik, Rabbena, Selam\",\n      \"DÖRT REKATLIK FARZIN KILINIŞI:\",\n      \"Birinci Rekât: İftitah Tekbiri, Sübhaneke, Eûzü-Besmele, Fatiha, Ek sure, Rükû, Secde\",\n      \"İkinci Rekât: Besmele, Fatiha, Ek sure, Rükû, Secde, İlk Oturuş: Tahiyyat\",\n      \"Üçüncü Rekât: Besmele, Fatiha, Rükû, Secde\",\n      \"Dördüncü Rekât: Besmele, Fatiha, Rükû, Secde, Son Oturuş: Tahiyyat, Salli-Bârik, Rabbena, Selam\"\n    ],\n    \"kelimeler\": [\n      [\n        \"Sahabi\",\n        \"Peygamberimize iman edip sohbetinde bulunan kişi\"\n      ],\n      [\n        \"Hicret\",\n        \"Göç etmek\"\n      ],\n      [\n        \"Ensar\",\n        \"Mekke'den hicret edenlere yardımda bulunan sahabeler\"\n      ],\n      [\n        \"Zevce\",\n        \"Hanım, eş\"\n      ],\n      [\n        \"Alicenaplık\",\n        \"Yüksek ahlak gösterme\"\n      ],\n      [\n        \"Mahcup\",\n        \"Utanan\"\n      ]\n    ]\n  },\n  \"13\": {\n    \"seri\": \"Elmas Serisi 13\",\n    \"vecize\": \"Allah'a muhabbetiniz varsa, Habîbullah'a ittibâ edilecek. İttibâ edilmezse, netice veriyor ki: Allah'a muhabbetiniz yoktur.\",\n    \"sureAdi\": \"Kâfirun Suresi\",\n    \"sure\": [\n      \"بِسْمِ اللّٰهِ الرَّحْمٰنِ الرَّحِيمِ ۞ قُلْ يَا أَيُّهَا الْكَافِرُونَ\",\n      \"لَا أَعْبُدُ مَا تَعْبُدُونَ\",\n      \"وَلَا أَنْتُمْ عَابِدُونَ مَا أَعْبُدُ\",\n      \"وَلَا أَنَا عَابِدٌ مَا عَبَدْتُمْ\",\n      \"وَلَا أَنْتُمْ عَابِدُونَ مَا أَعْبُدُ\",\n      \"لَكُمْ دِينُكُمْ وَلِيَ دِينِ\"\n    ],\n    \"ilmihalBaslik\": \"Akşam Namazı Farzı ve Vitir Namazı Kılınışı\",\n    \"ilmihal\": [\n      \"AKŞAM NAMAZININ FARZININ KILINIŞI:\",\n      \"Birinci Rekât: İftitah Tekbiri, Sübhaneke, Eûzü-Besmele, Fatiha, Ek sure, Rükû, Secde\",\n      \"İkinci Rekât: Besmele, Fatiha, Ek sure, Rükû, Secde, İlk Oturuş: Tahiyyat\",\n      \"Üçüncü Rekât: Besmele, Fatiha, Rükû, Secde, Son Oturuş: Tahiyyat, Salli-Bârik, Rabbena, Selam\",\n      \"VİTİR NAMAZININ KILINIŞI:\",\n      \"Birinci Rekât: İftitah Tekbiri, Sübhaneke, Eûzü-Besmele, Fatiha, Ek sure, Rükû, Secde\",\n      \"İkinci Rekât: Besmele, Fatiha, Ek sure, Rükû, Secde, İlk Oturuş: Tahiyyat\",\n      \"Üçüncü Rekât: Besmele, Fatiha, Ek sure, Kunut Tekbiri, Kunut Duaları, Rükû, Secde, Son Oturuş: Tahiyyat, Salli-Bârik, Rabbena, Selam\"\n    ],\n    \"kelimeler\": [\n      [\n        \"İktiza\",\n        \"Gerekme, gerektirme\"\n      ],\n      [\n        \"İttiba\",\n        \"Uymak\"\n      ],\n      [\n        \"Marziyat\",\n        \"Allahın razı olduğu haller\"\n      ],\n      [\n        \"Habibullah\",\n        \"Allah'ın sevdiği kul, Hz. Muhammed\"\n      ],\n      [\n        \"Sünnet-i Seniyye\",\n        \"Peygamberimizin en yüksek davranış ve halleri\"\n      ],\n      [\n        \"Muhabbetullah\",\n        \"Allah sevgisi\"\n      ]\n    ]\n  },\n  \"14\": {\n    \"seri\": \"Elmas Serisi 14\",\n    \"vecize\": \"En hayırlı genç odur ki; ihtiyar gibi ölümü düşünüp âhiretine çalışarak, gençlik hevesatına esir olmayıp gaflette boğulmayandır.\",\n    \"sureAdi\": \"Kevser Suresi\",\n    \"sure\": [\n      \"بِسْمِ اللّٰهِ الرَّحْمٰنِ الرَّحِيمِ ۞ إِنَّا أَعْطَيْنَاكَ الْكَوْثَرَ\",\n      \"فَصَلِّ لِرَبِّكَ وَانْحَرْ\",\n      \"إِنَّ شَانِئَكَ هُوَ الْأَبْتَرُ\"\n    ],\n    \"ilmihalBaslik\": \"Yalan Söylemenin Dinimizdeki Hükmü Nedir?\",\n    \"ilmihal\": [\n      \"Dinimiz yalan ve yalancılığı günahların en büyüklerinden birisi olarak kabul eder.\",\n      \"Hz. Peygamber (asm): Size büyük günahların en büyüğünü haber vereyim mi? buyurmuş ve bunu üç kere tekrar etmiştir.\",\n      \"Allah'a şirk koşmak, anne-baba haklarına riayetsizlik, cana kıymak buyurmuşlardır.\",\n      \"Haberiniz olsun! Yalan söz, yalan şahitlik. diyerek yalanın büyük günahlardan olduğunu vurgulamıştır. (Buhari, Şehadet, 10)\",\n      \"Yalan, pek çok büyük günahı tetikleyebilecek potansiyele sahip bir günahtır.\",\n      \"Yalan neredeyse bütün büyük günahlarla irtibatlıdır.\"\n    ],\n    \"kelimeler\": [\n      [\n        \"Ahsen-i Takvim\",\n        \"En güzel kıvam\"\n      ],\n      [\n        \"Ezvak\",\n        \"Zevkler\"\n      ],\n      [\n        \"Cihazat-ı Maneviye\",\n        \"Manevi aletler (akıl, kalp gibi)\"\n      ],\n      [\n        \"Zaika-i Lisaniye\",\n        \"Tat alma duyusu\"\n      ],\n      [\n        \"İnkişaf\",\n        \"Gelişme, açılma\"\n      ],\n      [\n        \"Hevesat\",\n        \"Geçici istekler, hevesler\"\n      ]\n    ]\n  },\n  \"15\": {\n    \"seri\": \"Elmas Serisi 15\",\n    \"vecize\": \"Sizler iman etmedikçe cennete giremezsiniz. Birbirinizi sevmedikçe de iman etmiş olmazsınız.\",\n    \"sureAdi\": \"Mâûn Suresi\",\n    \"sure\": [\n      \"بِسْمِ اللّٰهِ الرَّحْمٰنِ الرَّحِيمِ ۞ أَرَأَيْتَ الَّذِي يُكَذِّبُ بِالدِّينِ\",\n      \"فَذٰلِكَ الَّذِي يَدُعُّ الْيَتِيمَ\",\n      \"وَلَا يَحُضُّ عَلَى طَعَامِ الْمِسْكِينِ\",\n      \"فَوَيْلٌ لِلْمُصَلِّينَ\",\n      \"الَّذِينَ هُمْ عَنْ صَلَاتِهِمْ سَاهُونَ\",\n      \"الَّذِينَ هُمْ يُرَاؤُونَ\",\n      \"وَيَمْنَعُونَ الْمَاعُونَ\"\n    ],\n    \"ilmihalBaslik\": \"Namazın Vacipleri Nelerdir?\",\n    \"ilmihal\": [\n      \"Namaza Allahu ekber sözüyle başlamak\",\n      \"Her rekâtta Fatiha suresini okumak\",\n      \"Farz namazların ilk iki rekâtında, nafile ve vitir namazlarının her rekâtında Fatiha'dan sonra sure okumak\",\n      \"Fatiha'yı zamm-ı sureden önce okumak\",\n      \"Farz namazların ilk iki rekâtında kıraati yapmak\",\n      \"Üç-dört rekâtlı namazlarda ikinci rekât sonunda oturmak\",\n      \"Birinci ve son oturuşlarda Ettehiyyatü okumak\",\n      \"Secdeleri peş peşe yapmak, secdede alınla beraber burnu da yere koymak\",\n      \"Rükû, secde ve oturuşlarda duruşu düzgün ve sakin yapmak\",\n      \"Namaz sonunda selam vermek\",\n      \"Vitir namazının son rekâtında Kunut dualarını okumak\"\n    ],\n    \"kelimeler\": [\n      [\n        \"Nazar-ı Afv\",\n        \"Affedici bakış\"\n      ],\n      [\n        \"Hasenât\",\n        \"İyilikler\"\n      ],\n      [\n        \"Ziyâde\",\n        \"Fazla\"\n      ],\n      [\n        \"Hayat-ı İçtimaiye\",\n        \"Sosyal hayat\"\n      ],\n      [\n        \"Kemiyet\",\n        \"Sayıca, sayı bakımından\"\n      ],\n      [\n        \"Keyfiyet\",\n        \"Özellik, özellik bakımından\"\n      ]\n    ]\n  },\n  \"16\": {\n    \"seri\": \"Elmas Serisi 16\",\n    \"vecize\": \"Eğer biz doğru İslâmiyeti ve İslâmiyete lâyık doğruluğu ve istikameti göstersek, bundan sonra onlardan fevc fevc dahil olacaklardır.\",\n    \"sureAdi\": \"Kureyş Suresi\",\n    \"sure\": [\n      \"بِسْمِ اللّٰهِ الرَّحْمٰنِ الرَّحِيمِ ۞ لِإِيلَافِ قُرَيْشٍ\",\n      \"إِيلَافِهِمْ رِحْلَةَ الشِّتَاءِ وَالصَّيْفِ\",\n      \"فَلْيَعْبُدُوا رَبَّ هٰذَا الْبَيْتِ\",\n      \"الَّذِي أَطْعَمَهُمْ مِنْ جُوعٍ وَآمَنَهُمْ مِنْ خَوْفٍ\"\n    ],\n    \"ilmihalBaslik\": \"Namazı Bozan Haller Nelerdir?\",\n    \"ilmihal\": [\n      \"Yanılarak, unutarak veya uyuklayarak bile olsa konuşmak\",\n      \"Namaz esnasında ağza dışarıdan bir şey alıp yutmak\",\n      \"Dışarıdan görenin namaz kılmıyor diyeceği kadar çok hareket etmek\",\n      \"Göğsü haklı mazeret olmaksızın kıbleden başka tarafa çevirmek\",\n      \"Namazdayken abdesti bozan bir durumun meydana gelmesi\",\n      \"Namazda iken bayılmak\"\n    ],\n    \"kelimeler\": [\n      [\n        \"Sadakat\",\n        \"Bağlılık\"\n      ],\n      [\n        \"Şek\",\n        \"Şüphe\"\n      ],\n      [\n        \"Sıddık\",\n        \"Daima doğruluk üzere olan\"\n      ],\n      [\n        \"Mirac\",\n        \"Peygamberimizin Yedi Kat Semaya yükselmesi\"\n      ],\n      [\n        \"İsra\",\n        \"Peygamberimizin Mescid-i Haram'dan Mescid-i Aksa'ya gitmesi\"\n      ],\n      [\n        \"Müşrik\",\n        \"Ortak (şirk) koşan kimse\"\n      ]\n    ]\n  },\n  \"17\": {\n    \"seri\": \"Elmas Serisi 17\",\n    \"vecize\": \"İman hem nurdur, hem kuvvettir. Evet hakikî imanı elde eden adam, kâinata meydan okuyabilir.\",\n    \"sureAdi\": \"Fil Suresi\",\n    \"sure\": [\n      \"بِسْمِ اللّٰهِ الرَّحْمٰنِ الرَّحِيمِ ۞ أَلَمْ تَرَ كَيْفَ فَعَلَ رَبُّكَ بِأَصْحَابِ الْفِيلِ\",\n      \"أَلَمْ يَجْعَلْ كَيْدَهُمْ فِي تَضْلِيلٍ\",\n      \"وَأَرْسَلَ عَلَيْهِمْ طَيْرًا أَبَابِيلَ\",\n      \"تَرْمِيهِمْ بِحِجَارَةٍ مِنْ سِجِّيلٍ\",\n      \"فَجَعَلَهُمْ كَعَصْفٍ مَأْكُولٍ\"\n    ],\n    \"ilmihalBaslik\": \"Namazı Bozan Haller Nelerdir? (Devam)\",\n    \"ilmihal\": [\n      \"Kendi işiteceği kadar gülmek (yanındakilerin işiteceği kadar gülmek hem namazı hem abdesti bozar)\",\n      \"Namazın bir rüknünü yerine getirecek kadar sürede avret yerinin açılması\",\n      \"Manayı bozacak derecede büyük hata ile Kur'an okumak\",\n      \"İnsan kelamına benzeyen dualar etmek\",\n      \"Çok aşırı derecede elbise düzeltmek\",\n      \"Erkek ile kadının aynı hizada namaz kılmaları\",\n      \"İmama uymuş kimsenin rüknü imamdan önce yapması\"\n    ],\n    \"kelimeler\": [\n      [\n        \"Riya\",\n        \"Gösteriş\"\n      ],\n      [\n        \"Sefine\",\n        \"Gemi\"\n      ],\n      [\n        \"Saadet-i Dareyn\",\n        \"İki dünya mutluluğu\"\n      ],\n      [\n        \"Berzah\",\n        \"Kabir hayatında ruhların bulunduğu alem\"\n      ],\n      [\n        \"Tevekkül\",\n        \"Sorumluluğu yerine getirip neticeyi Allah'tan bilmek\"\n      ],\n      [\n        \"Tekebbür\",\n        \"Büyüklenmek, kibirlenmek\"\n      ]\n    ]\n  },\n  \"18\": {\n    \"seri\": \"Elmas Serisi 18\",\n    \"vecize\": \"Hayatın lezzetini, zevkini isterseniz, hayatınızı imanla hayatlandırınız ve feraizle ziynetlendiriniz ve günahlardan çekinmekle muhafaza ediniz.\",\n    \"sureAdi\": \"Hümeze Suresi\",\n    \"sure\": [\n      \"بِسْمِ اللّٰهِ الرَّحْمٰنِ الرَّحِيمِ ۞ وَيْلٌ لِكُلِّ هُمَزَةٍ لُمَزَةٍ\",\n      \"الَّذِي جَمَعَ مَالًا وَعَدَّدَهُ\",\n      \"يَحْسَبُ أَنَّ مَالَهُ أَخْلَدَهُ\",\n      \"كَلَّا لَيُنْبَذَنَّ فِي الْحُطَمَةِ\",\n      \"وَمَا أَدْرَاكَ مَا الْحُطَمَةُ\",\n      \"نَارُ اللّٰهِ الْمُوقَدَةُ\",\n      \"الَّتِي تَطَّلِعُ عَلَى الْأَفْئِدَةِ\",\n      \"إِنَّهَا عَلَيْهِمْ مُؤْصَدَةٌ\",\n      \"فِي عَمَدٍ مُمَدَّدَةٍ\"\n    ],\n    \"ilmihalBaslik\": \"Namazın Mekruhları Nelerdir?\",\n    \"ilmihal\": [\n      \"Üstünü başını düzeltmek, saçla oynamak veya elbiseyle uğraşmak\",\n      \"Abdesti sıkıştıracak derecede yel, idrar veya dışkı zorlamasıyla namaz kılmak\",\n      \"Parmak çıtlatmak veya parmakları birbirine geçirmek\",\n      \"Özürsüz yere gözleri yummak, gözleri yukarı dikmek veya etrafa bakmak\",\n      \"Kolları yere sermek\",\n      \"Kaşınmak ve terini silmek\",\n      \"Rükû ve secdelerde duraklamadan, aceleyle namaz kılmak\",\n      \"Temiz olmayan veya canlı resimli elbiseyle namaz kılmak\",\n      \"Sureleri Mushaf sırasına göre okumamak\"\n    ],\n    \"kelimeler\": [\n      [\n        \"Feraiz\",\n        \"Farzlar\"\n      ],\n      [\n        \"Muaccel\",\n        \"Peşin, hemen\"\n      ],\n      [\n        \"Mücazat\",\n        \"Suç karşılığı, ceza\"\n      ],\n      [\n        \"Seyyiat\",\n        \"Günahlar, kötülükler\"\n      ],\n      [\n        \"Sû'-i Zan\",\n        \"Kötü zan, kötü düşünce\"\n      ],\n      [\n        \"Men Dakka Dukka\",\n        \"Eden bulur\"\n      ]\n    ]\n  },\n  \"19\": {\n    \"seri\": \"Elmas Serisi 19\",\n    \"vecize\": \"Adem-i rü'yet, adem-i vücuda delalet etmez. Görünmemek, olmamaya hüccet olamaz.\",\n    \"sureAdi\": \"Asr Suresi\",\n    \"sure\": [\n      \"بِسْمِ اللّٰهِ الرَّحْمٰنِ الرَّحِيمِ ۞ وَالْعَصْرِ\",\n      \"إِنَّ الْإِنْسَانَ لَفِي خُسْرٍ\",\n      \"إِلَّا الَّذِينَ آمَنُوا وَعَمِلُوا الصَّالِحَاتِ وَتَوَاصَوْا بِالْحَقِّ وَتَوَاصَوْا بِالصَّبْرِ\"\n    ],\n    \"ilmihalBaslik\": \"Oruç Nedir, Kimlere Farzdır?\",\n    \"ilmihal\": [\n      \"Oruç, imsak vaktinden iftar vaktine kadar ibadet niyetiyle yeme içmeden uzak durma halidir.\",\n      \"Akıl sağlığı yerinde, ergenlik çağına ulaşmış, mukim ve oruç tutmaya engel mazereti bulunmayan her müslümana Ramazan orucu farzdır.\",\n      \"KAZA VE KEFÂRET ORUÇLARI NELERDİR?\",\n      \"Kaza orucu: Tutulamayan Ramazan orucunun başka zamanda gününe gün tutulmasıdır.\",\n      \"Kefâret orucu: Ramazan'da mazeretsiz kasten oruç bozmanın cezası olup ara verme
